<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Correctly using Thymeleaf's syntax for static resources -->
    <link th:href="@{/css/register.css}" rel="stylesheet" type="text/css" />
    <title>Registration Page</title>
    <!-- Link to your register.js file -->
</head>

<body>
    <!-- Header section -->
    <header id="registration-header-container" class="header-container">
        <button class="button" data-text="Awesome">
            <span class="actual-text">&nbsp;Tradehook&nbsp;</span>
            <span aria-hidden="true" class="hover-text">&nbsp;Tradehook&nbsp;</span>
        </button>
    </header>

    <!-- Main content for registration -->
    <main id="registration-container">
        <h1 class="main-header" id="registration-header">Create New Account</h1>

        <!-- Display the error message if it exists -->
        <div th:if="${error}" style="color: red; font-weight: bold; padding: 10px; background-color: #f8d7da; border: 1px solid red;">
            <p th:text="${error}"></p>
        </div>

        <!-- Thymeleaf Form (Note: remove the 'id' attributes that are conflicting with Thymeleaf) -->
        <form class="form" id="registration-form" th:action="@{/register}" method="post">
            <input id="email-input" class="form-input" type="email" autocomplete="off" placeholder="Email" name="email" th:value="${email}" required />
        
            <input id="password-input" class="form-input" type="password" autocomplete="off" placeholder="Password" name="password" th:value="${password}" required />
        
            <input id="confirm-password-input" class="form-input" type="password" autocomplete="off" placeholder="Confirm Password" name="confirmPassword" required />
        
            <button id="registration-button" class="button submit-button" type="submit">Register</button>
        </form>
        <p id="registration-page-login-redirect">Already have an account? <a id="login-link" href="http://localhost:8080/login">Login</a></p>
    </main>

    <!-- External JS file for validation -->
    <script th:src="@{/js/register.js}"></script>
</body>
</html>
